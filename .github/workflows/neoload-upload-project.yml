name: Reminder - Upload Project via NeoLoad Desktop

# This workflow reminds you to upload the project via NeoLoad Desktop
# Automatic upload via API is complex and not reliably supported
# The recommended approach is to use NeoLoad Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '*.nlp'
      - 'config.zip'
      - 'recorded-*/**'
      - 'custom-resources/**'
      - 'lib/**'

jobs:
  upload-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: NeoLoad Project Upload Reminder
        run: |
          echo "================================================"
          echo "⚠️ NeoLoad Project Files Changed"
          echo "================================================"
          echo ""
          echo "Detected changes to NeoLoad project files:"
          echo "  - *.nlp"
          echo "  - config.zip"
          echo "  - recorded files"
          echo ""
          echo "📋 ACTION REQUIRED:"
          echo "================================================"
          echo ""
          echo "1. Open NeoLoad Desktop"
          echo "2. Open project: Neoload_GIT_HUB"
          echo "3. Go to: File → Upload to NeoLoad Web"
          echo "4. Select workspace: Default Workspace"
          echo "5. Click Upload"
          echo ""
          echo "================================================"
          echo "✅ After upload, you can run tests via:"
          echo "   Actions → 'NeoLoad Run Test (Project Already Uploaded)'"
          echo "================================================"
          echo ""
          echo "🔗 NeoLoad Web: https://neoload.saas.neotys.com/"
          echo "================================================"

      - name: Check Project Files
        uses: actions/checkout@v4

      - name: List Changed Files
        run: |
          echo ""
          echo "Files that need to be uploaded:"
          ls -lh *.nlp config.zip 2>/dev/null || echo "Project files found"
          echo ""
          echo "Remember: GitHub has the latest version."
          echo "Now upload to NeoLoad Web via Desktop!"
