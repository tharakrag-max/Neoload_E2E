name: NeoLoad Performance Test

on:
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Test scenario name'
        required: false
        default: 'scenario1'
      duration:
        description: 'Test duration (e.g., 5m, 10m)'
        required: false
        default: '5m'

jobs:
  neoload-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install NeoLoad CLI
        run: |
          pip install neoload
          neoload --version

      - name: Configure NeoLoad Web
        env:
          NEOLOAD_TOKEN: ${{ secrets.NEOLOAD_TOKEN }}
        run: |
          echo "Logging into NeoLoad Web..."
          neoload login --url https://neoload-api.saas.neotys.com $NEOLOAD_TOKEN

          echo "Listing available workspaces..."
          neoload workspaces ls

          echo "Selecting workspace..."
          neoload workspaces use "Default Workspace"

          echo "Verifying workspace selection..."
          neoload status

          echo "Checking project file..."
          ls -la *.nlp

      - name: Run NeoLoad test
        env:
          NEOLOAD_TOKEN: ${{ secrets.NEOLOAD_TOKEN }}
        run: |
          echo "Running test from local project..."
          echo "Project will use the default scenario defined in the .nlp configuration"

          neoload run \
            --name "GitHub-Run-${{ github.run_number }}" \
            --description "Triggered by ${{ github.actor }}" \
            --as-code . \
            --web

      - name: Generate test report
        if: always()
        env:
          NEOLOAD_TOKEN: ${{ secrets.NEOLOAD_TOKEN }}
        run: |
          echo "Listing test results..."
          neoload test-results ls || true
          echo "Generating JUnit report..."
          neoload test-results --junit-file neoload-results.xml junitsla || echo "Failed to generate JUnit report"
          echo "Getting logs URL..."
          neoload logs-url || echo "No logs available"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neoload-results
          path: neoload-results.xml
          if-no-files-found: warn
